[pytest]
# Put the repo root on sys.path so tests can `import resources.lib.<module>`
# (the addon ships no top-level package, so resources/ resolves as a namespace
# package from the root). Requires pytest >= 7 for the `pythonpath` option.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
